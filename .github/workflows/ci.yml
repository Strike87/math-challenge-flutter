name: CI

on:
  push:
  pull_request:

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      # Golden tests run manually or in a dedicated golden environment because pixel output can differ by OS/font renderer.
      - run: flutter test --reporter compact --exclude-tags golden
      - run: flutter analyze
